<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Snippets" />
    <title>HTML Paste & Preview</title>
    <script>
      // Generate high-quality PNG icon on the fly for iOS Home Screen
      // iOS Safari strictly prefers PNGs for the home screen icon.
      (function() {
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
          <defs>
            <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#3b82f6" />
              <stop offset="100%" stop-color="#1d4ed8" />
            </linearGradient>
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
            </filter>
          </defs>
          <rect width="512" height="512" fill="url(#bg)" />
          <g filter="url(#shadow)">
            <path d="M 200 166 L 100 256 L 200 346" stroke="white" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <path d="M 260 176 L 410 256 L 260 336 Z" fill="white" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
          </g>
        </svg>`;
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          canvas.width = 512;
          canvas.height = 512;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const pngUrl = canvas.toDataURL('image/png');
          
          const appleLink = document.createElement('link');
          appleLink.rel = 'apple-touch-icon';
          appleLink.href = pngUrl;
          document.head.appendChild(appleLink);
          
          const favicon = document.createElement('link');
          favicon.rel = 'icon';
          favicon.type = 'image/png';
          favicon.href = pngUrl;
          document.head.appendChild(favicon);
        };
        img.src = 'data:image/svg+xml;base64,' + btoa(svg);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
